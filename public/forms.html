<!DOCTYPE html>
<!--
  This page is never linked or visited by real users.
  It exists solely so Netlify's build-time form detector can find and
  register the "trip-request" form (Netlify can't see forms rendered by
  client-side JavaScript in the React app, only static HTML). The live
  Plan My Trip page submits to this same form name via a background fetch.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form detection</title>
  </head>
  <body>
    <form name="trip-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="trip-request" />
      <input type="text" name="bot-field" />

      <input type="text" name="First Name" />
      <input type="text" name="Last Name" />
      <input type="email" name="Email Address" />
      <input type="text" name="Phone / WhatsApp" />
      <input type="text" name="Country of Residence" />
      <input type="text" name="Preferred Contact Method" />

      <input type="text" name="Arrival Date" />
      <input type="text" name="Departure Date" />
      <input type="text" name="Number of Days" />
      <input type="text" name="Adults" />
      <input type="text" name="Infants" />
      <input type="text" name="Children" />
      <input type="text" name="Teens" />
      <input type="text" name="Travelling with Pets" />

      <input type="text" name="Destinations" />
      <input type="text" name="Other Destinations" />

      <input type="text" name="Hotel Rating" />
      <input type="text" name="Room Types" />

      <input type="text" name="Activities" />
      <input type="text" name="Other Activities" />

      <input type="text" name="Preferred Language" />
      <input type="text" name="Driver Gender Preference" />
      <input type="text" name="Preferred Driver Age" />
      <input type="text" name="LGBTQ Friendly Driver" />
      <input type="text" name="Child Friendly Driver" />

      <input type="text" name="Food Preferences" />
      <input type="text" name="Spice Level" />
      <input type="text" name="Allergies / Medical" />

      <input type="text" name="Cultural Preferences" />
      <input type="text" name="Cultural Details" />

      <input type="text" name="Budget" />
      <textarea name="Dream Trip"></textarea>

      <input type="text" name="Terms Agreed" />
      <textarea name="Full Trip Request"></textarea>
    </form>
  </body>
</html>
